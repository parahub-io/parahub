# Common security headers — single point of truth.
# CSP is site-specific and stays in each server block.
#
# WARNING (nginx add_header semantics): any add_header inside a location
# discards ALL add_header directives inherited from the server level. A
# location that sets its own header AND serves HTML must re-include this
# file, otherwise the page silently loses HSTS/CSP/X-Frame-Options.
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# HSTS: force HTTPS for 1 year, all subdomains, preload-list eligible.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
