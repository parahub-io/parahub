# Shared directives for edge-cached read-only transit GET endpoints.
# Included by per-endpoint locations in sites-available/parahub.io; each
# location sets its own `proxy_cache_valid` (TTL) after the include.
#
# dev-slot traffic (parahub_dev cookie) bypasses the cache entirely
# (proxy_cache_bypass reads around it, proxy_no_cache skips storing) so prod
# and dev responses never share an entry. Only prod (no cookie) is cached.

proxy_pass http://$backend_upstream;
proxy_http_version 1.1;
proxy_set_header Connection "";
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $server_name;

proxy_buffering on;                       # required for caching (the /api/ block turns it off)
proxy_cache transit_cache;
proxy_cache_key "$scheme$host$request_uri";   # request_uri carries bbox/agency_id query
proxy_cache_bypass $cookie_parahub_dev;   # dev cookie -> don't serve from cache
proxy_no_cache $cookie_parahub_dev;       # dev cookie -> don't store
proxy_cache_lock on;                      # collapse concurrent misses into one upstream fetch
proxy_cache_use_stale updating error timeout;

# A location with its own add_header stops inheriting the server-level ones, so
# re-assert the security headers here (CSP omitted — meaningless on a JSON API).
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Cache-Status $upstream_cache_status always;
