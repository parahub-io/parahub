# http-context log format with request timing — the only way to measure the
# "API p95 < 50ms" target at the edge. Symlink into /etc/nginx/conf.d/
# (log_format is not allowed inside server blocks, so this cannot live in
# snippets/ or a site config).
#
# rt  = full request time as nginx saw it (client + upstream)
# urt = upstream (Django/Nuxt) response time only
#
# p95 of /api for the last 100k lines:
#   grep ' /api' /var/log/nginx/parahub_access.log | tail -100000 \
#     | grep -oP 'rt=\K[0-9.]+' | sort -n | awk '{a[NR]=$1} END{print a[int(NR*0.95)]}'
log_format timed '$remote_addr - $remote_user [$time_local] '
                 '"$request" $status $body_bytes_sent '
                 '"$http_referer" "$http_user_agent" '
                 'rt=$request_time urt=$upstream_response_time';
