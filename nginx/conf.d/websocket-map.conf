# WebSocket upgrade mapping (http context — shared by all vhosts that use
# $connection_upgrade: git.parahub.io, jitsi.parahub.io).
# Lives in conf.d because map{} is not allowed inside server blocks;
# setup-nginx.sh symlinks nginx/conf.d/*.conf into /etc/nginx/conf.d/.
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
