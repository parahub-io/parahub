<!DOCTYPE html>
<html lang="en">
{% load i18n allauth %}
<head>
    <meta charset="UTF-8">
    <title>{% translate "Redirecting..." %}</title>
    <meta http-equiv="refresh" content="0;URL='{{ redirect_to }}'" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #fafafa;
            color: #171717;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0a0a0a;
                color: #fafafa;
            }
        }

        .container {
            text-align: center;
        }

        .spinner {
            width: 2.5rem;
            height: 2.5rem;
            border: 3px solid #e5e5e5;
            border-top-color: #171717;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @media (prefers-color-scheme: dark) {
            .spinner {
                border-color: #404040;
                border-top-color: #fafafa;
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        p {
            color: #737373;
            font-size: 0.875rem;
        }

        @media (prefers-color-scheme: dark) {
            p {
                color: #a3a3a3;
            }
        }

        a {
            color: #525252;
            text-decoration: none;
            font-size: 0.875rem;
            margin-top: 1rem;
            display: inline-block;
        }

        a:hover {
            text-decoration: underline;
        }

        @media (prefers-color-scheme: dark) {
            a {
                color: #a3a3a3;
            }

            a:hover {
                color: #fafafa;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>{% translate "Redirecting..." %}</p>
        <a href="{{ redirect_to }}">{% translate "Click here if not redirected" %}</a>
    </div>
</body>
</html>
