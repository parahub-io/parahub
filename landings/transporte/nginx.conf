# transporte.parahub.io — Static landing page (auto-generated, do not edit manually)
# Regenerate: python3 landings/_generate.py transporte

server {
    listen 80;
    server_name transporte.parahub.io;
    return 301 https://transporte.parahub.io$request_uri;
}

server {
    listen 443 ssl;
    server_name transporte.parahub.io;
    ssl_certificate /etc/letsencrypt/live/transporte.parahub.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/transporte.parahub.io/privkey.pem;

    root /opt/parahub/landings/transporte/output;

    # Security headers. Keep add_header OUT of child locations: a location-level
    # add_header replaces ALL inherited ones (caching there uses `expires` instead).
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'none'; script-src https://parahub.io; style-src 'unsafe-inline'; img-src 'self' https://parahub.io; connect-src 'self' https://parahub.io; base-uri 'none'; form-action 'none'; frame-ancestors 'self'" always;

    # HTML/sitemap/robots: short cache so regenerated copy propagates within an hour
    expires 1h;

    # Default locale (pt)
    location = / {
        try_files /index.html =404;
    }

    # English
    location = /en/ {
        root /opt/parahub/landings/transporte/output;
        try_files /en/index.html =404;
    }

    # Español
    location = /es/ {
        root /opt/parahub/landings/transporte/output;
        try_files /es/index.html =404;
    }

    # Français
    location = /fr/ {
        root /opt/parahub/landings/transporte/output;
        try_files /fr/index.html =404;
    }

    # Deutsch
    location = /de/ {
        root /opt/parahub/landings/transporte/output;
        try_files /de/index.html =404;
    }

    # Русский
    location = /ru/ {
        root /opt/parahub/landings/transporte/output;
        try_files /ru/index.html =404;
    }

    # Sitemap, Robots & OG image
    location = /sitemap.xml {
        try_files /sitemap.xml =404;
    }

    location = /robots.txt {
        try_files /robots.txt =404;
    }

    location = /og.png {
        try_files /og.png =404;
        expires 7d;
    }

    location = /para.webp {
        try_files /para.webp =404;
        expires 7d;
    }

    # Anything else → redirect to root
    location / {
        return 301 /;
    }
}
