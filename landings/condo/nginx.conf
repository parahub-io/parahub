# condominios.parahub.io — Static landing page (auto-generated, do not edit manually)
# Regenerate: python3 landings/_generate.py condominios

server {
    listen 80;
    server_name condominios.parahub.io;
    return 301 https://condominios.parahub.io$request_uri;
}

server {
    listen 443 ssl;
    server_name condominios.parahub.io;
    ssl_certificate /etc/letsencrypt/live/condominios.parahub.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/condominios.parahub.io/privkey.pem;

    root /opt/parahub/landings/condo/output;

    # Default locale (pt)
    location = / {
        try_files /index.html =404;
    }

    # English
    location = /en/ {
        root /opt/parahub/landings/condo/output;
        try_files /en/index.html =404;
    }

    # Español
    location = /es/ {
        root /opt/parahub/landings/condo/output;
        try_files /es/index.html =404;
    }

    # Français
    location = /fr/ {
        root /opt/parahub/landings/condo/output;
        try_files /fr/index.html =404;
    }

    # Deutsch
    location = /de/ {
        root /opt/parahub/landings/condo/output;
        try_files /de/index.html =404;
    }

    # Русский
    location = /ru/ {
        root /opt/parahub/landings/condo/output;
        try_files /ru/index.html =404;
    }

    # Sitemap, Robots & OG image
    location = /sitemap.xml {
        try_files /sitemap.xml =404;
    }

    location = /robots.txt {
        try_files /robots.txt =404;
    }

    location = /og.png {
        try_files /og.png =404;
        add_header Cache-Control "public, max-age=604800";
    }

    location = /para.webp {
        try_files /para.webp =404;
        add_header Cache-Control "public, max-age=604800";
    }

    # Anything else → redirect to root
    location / {
        return 301 /;
    }
}
