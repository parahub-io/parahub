services:
  # ==================== DATABASE TIER ====================
  
  # Traccar PostgreSQL Database
  traccar-postgres:
    image: postgres:16.14-alpine
    container_name: traccar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: traccar
      POSTGRES_USER: traccar
      POSTGRES_PASSWORD: ${TRACCAR_DB_PASSWORD}
    volumes:
      - traccar-postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5435:5432"  # Different port to avoid conflict with main PostgreSQL
    networks:
      - parahub-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traccar"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== APPLICATION TIER ====================
  
  # Traccar GPS Tracking System
  traccar:
    image: traccar/traccar:6.14.5
    container_name: parahub-traccar
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5001:5001"  # GPS103
      - "5002:5002"  # TK103
      - "5013:5013"  # H02 protocol
      - "5023:5023"  # GT06
      - "5027:5027"  # Teltonika
      - "5055:5055"  # OsmAnd protocol
      - "127.0.0.1:8082:8082"  # Web UI
    volumes:
      - traccar-data:/opt/traccar/data
      - ./traccar/traccar.xml:/opt/traccar/conf/traccar.xml:ro
      - traccar-logs:/opt/traccar/logs
      - traccar-media:/opt/traccar/media
    environment:
      - JAVA_OPTS=-Xms512m -Xmx1024m
    networks:
      - parahub-net
    depends_on:
      traccar-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/api/server"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Martin Vector Tile Server for OpenMapTiles
  martin-osm:
    image: ghcr.io/maplibre/martin:1.11.0
    container_name: parahub-martin-osm
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: "postgres://openmaptiles:${OPENMAPTILES_DB_PASSWORD:-openmaptiles}@host.docker.internal:${OPENMAPTILES_DB_PORT:-5439}/openmaptiles"
      KEEP_ALIVE: "75"
      LISTEN_ADDRESSES: "0.0.0.0:3000"
      RUST_LOG: "martin=info"
    # Auto-discover functions and tables without config file
    command: ["--auto-bounds", "skip"]
    ports:
      - "127.0.0.1:3002:3000"
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
    networks:
      - parahub-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/catalog"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== UTILITY TIER ====================

  # Neo4j Graph Database for Barter Exchange Matching
  # Using Neo4j 5.26 LTS (Long-Term Support until June 2028)
  # https://neo4j.com/docs/operations-manual/5/docker/
  neo4j:
    image: neo4j:5.26-community
    container_name: parahub-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_server_memory_pagecache_size=2G
      - NEO4J_server_memory_heap_max__size=4G
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,gds.*
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-plugins:/plugins
    ports:
      - "127.0.0.1:7474:7474"  # HTTP
      - "127.0.0.1:7687:7687"  # Bolt
    networks:
      - parahub-net
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5


  # ==================== COMMUNICATION TIER ====================
  
  # Matrix Synapse Homeserver
  synapse:
    image: matrixdotorg/synapse:v1.155.0
    container_name: parahub-synapse
    restart: unless-stopped
    environment:
      - SYNAPSE_CONFIG_PATH=/data/homeserver.yaml
      - SYNAPSE_SERVER_NAME=parahub.io
      - SYNAPSE_REPORT_STATS=no
      - UID=1000
      - GID=1000
    volumes:
      - ./synapse/data:/data
      - ./synapse/config:/config:ro
    ports:
      - "127.0.0.1:8008:8008"  # Client-Server API
      - "127.0.0.1:8448:8448"  # Federation API
    networks:
      - parahub-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      - synapse-postgres

  # PostgreSQL Database for Synapse
  synapse-postgres:
    image: postgres:16.14-alpine
    container_name: parahub-synapse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: ${SYNAPSE_DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - synapse-postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"  # Different port to avoid conflicts
    networks:
      - parahub-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Synapse Admin Web Interface
  synapse-admin:
    image: ghcr.io/etkecc/synapse-admin@sha256:b27a079b962fb227d874b5729cad8eb77b69aa736310caf59b277fd09f7ccf4b
    container_name: parahub-synapse-admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:8085:80"
    networks:
      - parahub-net
    healthcheck:
      disable: true

  # ==================== DEVELOPMENT TIER ====================

  # Gitea Git Hosting
  gitea:
    image: gitea/gitea:1.26.4
    container_name: parahub-gitea
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=host.docker.internal:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=parahub
      - GITEA__database__PASSWD=${DB_PASSWORD}
      - GITEA__database__SCHEMA=public
      - GITEA__server__DOMAIN=git.parahub.io
      - GITEA__server__ROOT_URL=https://git.parahub.io/
      - GITEA__server__SSH_DOMAIN=git.parahub.io
      - GITEA__server__SSH_PORT=2222
      - GITEA__server__HTTP_PORT=3000
      - GITEA__service__DISABLE_REGISTRATION=false
      - GITEA__service__ALLOW_ONLY_EXTERNAL_REGISTRATION=true
      - GITEA__service__REQUIRE_SIGNIN_VIEW=true
      - GITEA__repository__DEFAULT_PRIVATE=private
      - GITEA__openid__ENABLE_OPENID_SIGNIN=false
      - GITEA__openid__ENABLE_OPENID_SIGNUP=false
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__oauth2_client__ENABLE_AUTO_REGISTRATION=true
      - GITEA__oauth2_client__ACCOUNT_LINKING=auto
      - GITEA__oauth2_client__UPDATE_AVATAR=true
      - GITEA__cors__ENABLED=true
      - GITEA__cors__SCHEME=https
      - GITEA__cors__ALLOW_DOMAIN=parahub.io
      - GITEA__cors__ALLOW_SUBDOMAIN=false
      - GITEA__cors__ALLOW_CREDENTIALS=true
      # Session cookies for cross-origin requests
      - GITEA__session__PROVIDER=file
      - GITEA__session__SAME_SITE=none
      - GITEA__session__COOKIE_SECURE=true
      - GITEA__session__COOKIE_NAME=i_like_gitea
    volumes:
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "127.0.0.1:3003:3000"  # HTTP
      - "2222:22"              # SSH for git push/pull
    networks:
      - parahub-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3


  # ==================== VIDEO TIER ====================

  # PeerTube Video Platform
  peertube:
    image: chocobozzz/peertube:v8.2.2-trixie
    container_name: parahub-peertube
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PEERTUBE_DB_USERNAME=parahub
      - PEERTUBE_DB_PASSWORD=${DB_PASSWORD}
      - PEERTUBE_DB_NAME=peertube
      - PEERTUBE_DB_HOSTNAME=host.docker.internal
      - PEERTUBE_DB_PORT=5432
      - PEERTUBE_REDIS_HOSTNAME=peertube-redis
      - PEERTUBE_REDIS_PORT=6379
      - PEERTUBE_WEBSERVER_HOSTNAME=video.parahub.io
      - PEERTUBE_WEBSERVER_PORT=443
      - PEERTUBE_WEBSERVER_HTTPS=true
      - PEERTUBE_TRUST_PROXY=["127.0.0.1", "172.21.0.0/16", "loopback"]
      - PEERTUBE_SECRET=${PEERTUBE_SECRET}
    volumes:
      - /opt/peertube-data:/data
      - /opt/peertube-config:/config
    ports:
      - "127.0.0.1:9000:9000"
      - "1935:1935"   # RTMP live streaming
    networks:
      - parahub-net
    depends_on:
      peertube-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:9000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Redis for PeerTube (isolated from main Redis)
  peertube-redis:
    image: redis:7.4.9-alpine
    container_name: parahub-peertube-redis
    restart: unless-stopped
    volumes:
      - peertube-redis-data:/data
    networks:
      - parahub-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== ROUTING TIER ====================

  # Valhalla Routing Engine (car, bike, pedestrian)
  valhalla:
    image: ghcr.io/valhalla/valhalla:3.7.0
    container_name: parahub-valhalla
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/scripts/run.sh"]
    environment:
      - VALHALLA_THREADS=8
    volumes:
      - ./valhalla/custom_files:/data
      - /opt/planet/planet-latest.osm.pbf:/data/planet-latest.osm.pbf:ro
      - ./valhalla/run.sh:/scripts/run.sh:ro
    ports:
      - "127.0.0.1:8002:8002"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - parahub-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 14400s
    deploy:
      resources:
        limits:
          memory: 32G
          cpus: '8'

  # MOTIS Transit Routing Engine (RAPTOR journey planning)
  motis:
    image: ghcr.io/motis-project/motis:2.10.2
    container_name: parahub-motis
    restart: unless-stopped
    working_dir: /data
    command: ["/motis", "server", "."]
    volumes:
      - /opt/motis/data:/data
      - /opt/motis/input:/input:ro
      - /opt/planet/planet-latest.osm.pbf:/input/planet-latest.osm.pbf:ro
    ports:
      - "127.0.0.1:8090:8080"
    networks:
      - parahub-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/api/v1/map/stops?min=0,0&max=0,0"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 7200s
    deploy:
      resources:
        limits:
          memory: 32G
          cpus: '8'

  # ==================== ANALYTICS TIER ====================

  # Plausible Analytics - PostgreSQL
  plausible-db:
    image: postgres:16.14-alpine
    container_name: plausible-db
    restart: unless-stopped
    volumes:
      - plausible-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: plausible
      POSTGRES_USER: plausible
      POSTGRES_PASSWORD: ${PLAUSIBLE_DB_PASSWORD}
    networks:
      - parahub-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plausible"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Plausible Analytics - ClickHouse (events store)
  plausible-events-db:
    image: clickhouse/clickhouse-server:24.12-alpine
    container_name: plausible-events-db
    restart: unless-stopped
    volumes:
      - plausible-events-data:/var/lib/clickhouse
      # Config files track plausible/community-edition v3.2.1 reference compose
      - ./clickhouse/logs.xml:/etc/clickhouse-server/config.d/logs.xml:ro
      - ./clickhouse/ipv4-only.xml:/etc/clickhouse-server/config.d/ipv4-only.xml:ro
      - ./clickhouse/low-resources.xml:/etc/clickhouse-server/config.d/low-resources.xml:ro
      - ./clickhouse/default-profile-low-resources-overrides.xml:/etc/clickhouse-server/users.d/default-profile-low-resources-overrides.xml:ro
    environment:
      CLICKHOUSE_DB: plausible_events
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_SKIP_USER_SETUP: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - parahub-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 1m

  # Plausible Analytics CE
  plausible:
    image: ghcr.io/plausible/community-edition:v3.2.1
    container_name: plausible
    restart: unless-stopped
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    ports:
      - "127.0.0.1:8091:8000"
    volumes:
      - plausible-data:/var/lib/plausible
    environment:
      TMPDIR: /var/lib/plausible/tmp
      BASE_URL: https://plausible.parahub.io
      SECRET_KEY_BASE: ${PLAUSIBLE_SECRET_KEY}
      DATABASE_URL: postgres://plausible:${PLAUSIBLE_DB_PASSWORD}@plausible-db:5432/plausible
      CLICKHOUSE_DATABASE_URL: http://plausible-events-db:8123/plausible_events
      DISABLE_REGISTRATION: invite_only
      MAILER_EMAIL: analytics@parahub.io
      SMTP_HOST_ADDR: host.docker.internal
      SMTP_HOST_PORT: 25
    depends_on:
      plausible-db:
        condition: service_healthy
      plausible-events-db:
        condition: service_healthy
    networks:
      - parahub-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ==================== JITSI MEET TIER ====================

  # Jitsi Meet Web (Frontend)
  jitsi-web:
    image: jitsi/web:stable-10978
    container_name: parahub-jitsi-web
    restart: unless-stopped
    environment:
      - PUBLIC_URL=https://jitsi.parahub.io
      - TZ=UTC
      - ENABLE_AUTH=1
      - AUTH_TYPE=jwt
      - JWT_APP_ID=parahub
      - JWT_APP_SECRET=${JITSI_JWT_SECRET}
      - JWT_ACCEPTED_ISSUERS=parahub.io
      - JWT_ACCEPTED_AUDIENCES=parahub
      - ENABLE_GUESTS=0
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_BOSH_URL_BASE=http://jitsi-prosody:5280
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - JICOFO_AUTH_USER=focus
      - JVB_WS_DOMAIN=jitsi.parahub.io
      - JVB_WS_SERVER_ID=default
      - ENABLE_XMPP_WEBSOCKET=1
      - DISABLE_HTTPS=1
      - ENABLE_HSTS=0
    volumes:
      - ./jitsi/web:/config
    ports:
      - "127.0.0.1:8443:80"
    networks:
      - parahub-net
    depends_on:
      - jitsi-prosody

  # Jitsi Prosody (XMPP Server)
  jitsi-prosody:
    image: jitsi/prosody:stable-10978
    container_name: parahub-jitsi-prosody
    restart: unless-stopped
    environment:
      - PUBLIC_URL=https://jitsi.parahub.io
      - TZ=UTC
      - ENABLE_AUTH=1
      - AUTH_TYPE=jwt
      - JWT_APP_ID=parahub
      - JWT_APP_SECRET=${JITSI_JWT_SECRET}
      - JWT_ACCEPTED_ISSUERS=parahub.io
      - JWT_ACCEPTED_AUDIENCES=parahub
      - ENABLE_GUESTS=0
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_RECORDER_DOMAIN=recorder.meet.jitsi
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - TURN_HOST=turn.parahub.io
      - TURN_PORT=3478
      - TURN_TRANSPORT=udp,tcp
      - TURNS_HOST=turn.parahub.io
      - TURNS_PORT=5349
      - TURN_CREDENTIALS=${TURN_SECRET}
      - STUN_HOST=turn.parahub.io
      - STUN_PORT=3478
    volumes:
      - ./jitsi/prosody/config:/config
      - ./jitsi/prosody/plugins:/prosody-plugins-custom
    networks:
      - parahub-net

  # Jitsi Jicofo (Conference Focus)
  jitsi-jicofo:
    image: jitsi/jicofo:stable-10978
    container_name: parahub-jitsi-jicofo
    restart: unless-stopped
    environment:
      - TZ=UTC
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_SERVER=jitsi-prosody
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - AUTH_TYPE=jwt
      - ENABLE_AUTH=1
    volumes:
      - ./jitsi/jicofo:/config
    networks:
      - parahub-net
    depends_on:
      - jitsi-prosody

  # Jitsi JVB (Video Bridge)
  jitsi-jvb:
    image: jitsi/jvb:stable-10978
    container_name: parahub-jitsi-jvb
    restart: unless-stopped
    environment:
      - TZ=UTC
      - PUBLIC_URL=https://jitsi.parahub.io
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_SERVER=jitsi-prosody
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - JVB_PORT=10000
      - JVB_WS_DOMAIN=jitsi.parahub.io
      - JVB_WS_SERVER_ID=default
      - JVB_STUN_SERVERS=turn.parahub.io:3478
    volumes:
      - ./jitsi/jvb:/config
    ports:
      - "10000:10000/udp"
      - "127.0.0.1:8080:8080"
    networks:
      - parahub-net
    depends_on:
      - jitsi-prosody

  # ==================== MONITORING TIER ====================

  # Uptime Kuma - Service Status Monitor
  uptime-kuma:
    image: louislam/uptime-kuma:2.4.0
    container_name: parahub-uptime-kuma
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uptime-kuma-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:3010:3001"
    networks:
      - parahub-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

# ==================== NETWORKS ====================
networks:
  parahub-net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.21.0.0/16

# ==================== VOLUMES ====================
volumes:
  # Traccar volumes
  traccar-data:
  traccar-logs:
  traccar-media:
  traccar-postgres-data:


  # Neo4j volumes
  neo4j-data:
  neo4j-logs:
  neo4j-plugins:

  # Matrix/Synapse volumes
  synapse-postgres-data:

  # Gitea volumes
  gitea-data:

  # Plausible Analytics volumes
  plausible-db-data:
  plausible-events-data:
  plausible-data:

  # PeerTube volumes
  peertube-redis-data:

  # Monitoring volumes
  uptime-kuma-data:
